<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Jennifer Boursinhac</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f6f5f2; --surface: #fff; --surface2: #f0efe9;
      --border: rgba(0,0,0,0.09); --border-md: rgba(0,0,0,0.16);
      --text1: #18181a; --text2: #6b6a66; --text3: #a8a7a2;
      --accent: #534AB7; --accent-bg: #EEEDFE;
      --danger: #D85A30; --danger-bg: #FAECE7;
      --r: 14px; --rs: 9px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #18181a; --surface: #222224; --surface2: #2a2a2c;
        --border: rgba(255,255,255,0.08); --border-md: rgba(255,255,255,0.16);
        --text1: #f0efea; --text2: #9a9994; --text3: #5a5a56;
        --accent: #AFA9EC; --accent-bg: #26215C;
        --danger: #F09595; --danger-bg: #501313;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text1); min-height: 100vh; }

    .layout { display: flex; min-height: 100vh; }
    nav { width: 210px; flex-shrink: 0; background: var(--surface); border-right: 0.5px solid var(--border); padding: 1.75rem 1rem; display: flex; flex-direction: column; gap: 2px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
    .nav-brand { display: flex; align-items: center; gap: 9px; margin-bottom: 1.5rem; }
    .nav-av { width: 32px; height: 32px; border-radius: 50%; background: var(--accent-bg); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; color: var(--accent); flex-shrink: 0; }
    .nav-name { font-size: 13px; font-weight: 500; }
    .nav-sub { font-size: 11px; color: var(--text2); }
    .nav-lbl { font-size: 9px; font-weight: 600; color: var(--text3); letter-spacing: .09em; text-transform: uppercase; padding: 0 6px; margin: 1rem 0 4px; }
    .nav-btn { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: var(--rs); font-size: 13px; color: var(--text2); cursor: pointer; border: none; background: none; width: 100%; text-align: left; transition: background .12s, color .12s; }
    .nav-btn:hover { background: var(--surface2); color: var(--text1); }
    .nav-btn.active { background: var(--accent-bg); color: var(--accent); font-weight: 500; }
    .nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .nav-count { margin-left: auto; font-size: 11px; background: var(--surface2); color: var(--text2); border-radius: 99px; padding: 1px 7px; }
    .nav-btn.active .nav-count { background: var(--accent-bg); color: var(--accent); }

    main { flex: 1; padding: 2.25rem 2rem 4rem; min-width: 0; }
    .topbar { display: flex; align-items: center; gap: 10px; margin-bottom: 1.75rem; }
    .search-wrap { flex: 1; max-width: 360px; position: relative; }
    .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text3); pointer-events: none; }
    #search { width: 100%; padding: 8px 10px 8px 32px; font-size: 13px; border: 0.5px solid var(--border-md); border-radius: var(--rs); background: var(--surface); color: var(--text1); outline: none; }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--text3); }
    .btn-new { display: flex; align-items: center; gap: 6px; padding: 8px 14px; font-size: 13px; font-weight: 500; background: var(--accent); color: #fff; border: none; border-radius: var(--rs); cursor: pointer; margin-left: auto; transition: opacity .15s; }
    .btn-new:hover { opacity: .88; }
    .btn-new svg { width: 14px; height: 14px; }

    .section-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 1.1rem; }
    .section-head h2 { font-size: 15px; font-weight: 500; }
    .section-head span { font-size: 13px; color: var(--text3); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 13px; }
    .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--r); padding: 1.1rem; display: flex; flex-direction: column; gap: 10px; text-decoration: none; color: inherit; position: relative; transition: border-color .15s, transform .12s; }
    .card:hover { border-color: var(--border-md); transform: translateY(-2px); }
    .card:hover .card-edit { opacity: 1; }
    .card-edit { position: absolute; top: 10px; right: 10px; width: 28px; height: 28px; border-radius: 7px; background: var(--surface2); border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transition: opacity .15s; z-index: 1; }
    .card-edit svg { width: 13px; height: 13px; color: var(--text2); }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .card-ico { width: 36px; height: 36px; border-radius: var(--rs); background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 19px; }
    .card-date { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .card-title { font-size: 14px; font-weight: 500; line-height: 1.4; }
    .card-desc { font-size: 12px; color: var(--text2); line-height: 1.6; flex: 1; }
    .card-footer { display: flex; gap: 5px; flex-wrap: wrap; }
    .badge { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 99px; }
    .empty { grid-column: 1/-1; text-align: center; padding: 4rem 2rem; color: var(--text3); font-size: 14px; }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.38); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; opacity: 0; pointer-events: none; transition: opacity .18s; }
    .overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 460px; padding: 1.75rem; display: flex; flex-direction: column; gap: 1.1rem; max-height: 90vh; overflow-y: auto; transform: translateY(14px); transition: transform .2s; }
    .overlay.open .modal { transform: translateY(0); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; }
    .modal-header h3 { font-size: 16px; font-weight: 500; }
    .modal-close { width: 28px; height: 28px; border-radius: 7px; background: var(--surface2); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); }
    .modal-close svg { width: 14px; height: 14px; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; font-weight: 500; color: var(--text2); }
    .field input, .field textarea { padding: 9px 11px; font-size: 13px; border: 0.5px solid var(--border-md); border-radius: var(--rs); background: var(--surface2); color: var(--text1); outline: none; font-family: inherit; resize: none; transition: border-color .15s; }
    .field input:focus, .field textarea:focus { border-color: var(--accent); background: var(--surface); }
    .field-row { display: grid; grid-template-columns: 76px 1fr; gap: 10px; }

    .tags-wrap { display: flex; gap: 7px; flex-wrap: wrap; }
    .tag-chip { display: flex; align-items: center; gap: 5px; padding: 5px 11px; border-radius: 99px; font-size: 12px; font-weight: 500; border: 0.5px solid var(--border-md); background: var(--surface2); color: var(--text2); cursor: pointer; transition: all .12s; user-select: none; }
    .chip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .new-tag-row { display: flex; gap: 7px; margin-top: 4px; }
    .new-tag-input { flex: 1; padding: 7px 10px; font-size: 12px; border: 0.5px solid var(--border-md); border-radius: var(--rs); background: var(--surface2); color: var(--text1); outline: none; font-family: inherit; }
    .new-tag-input:focus { border-color: var(--accent); }
    .btn-add-tag { padding: 7px 12px; font-size: 12px; border-radius: var(--rs); border: 0.5px solid var(--border-md); background: var(--surface2); color: var(--text2); cursor: pointer; white-space: nowrap; }
    .btn-add-tag:hover { background: var(--surface); color: var(--text1); }

    .modal-actions { display: flex; gap: 8px; padding-top: 4px; }
    .btn-save { flex: 1; padding: 10px; font-size: 14px; font-weight: 500; background: var(--accent); color: #fff; border: none; border-radius: var(--rs); cursor: pointer; transition: opacity .15s; }
    .btn-save:hover { opacity: .88; }
    .btn-delete { padding: 10px 14px; font-size: 13px; background: var(--danger-bg); color: var(--danger); border: none; border-radius: var(--rs); cursor: pointer; }
    .btn-delete:hover { opacity: .8; }
  </style>
</head>
<body>
<div class="layout">
  <nav id="nav">
    <div class="nav-brand">
      <div class="nav-av">JB</div>
      <div><div class="nav-name">Jennifer B.</div><div class="nav-sub">Mes projets</div></div>
    </div>
  </nav>
  <main>
    <div class="topbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search" type="text" placeholder="Rechercher…" autocomplete="off" />
      </div>
      <button class="btn-new" id="btn-new">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Nouveau projet
      </button>
    </div>
    <div class="section-head"><h2 id="sec-title">Tous les projets</h2><span id="sec-count"></span></div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<div class="overlay" id="overlay">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h3 id="modal-title">Nouveau projet</h3>
      <button class="modal-close" id="modal-close" aria-label="Fermer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Icône</label>
        <input id="f-icon" type="text" placeholder="🎨" maxlength="4" style="text-align:center;font-size:20px;padding:6px;" />
      </div>
      <div class="field">
        <label>Titre</label>
        <input id="f-title" type="text" placeholder="Nom du projet" />
      </div>
    </div>
    <div class="field">
      <label>Description</label>
      <textarea id="f-desc" rows="2" placeholder="Courte description…"></textarea>
    </div>
    <div class="field">
      <label>Lien</label>
      <input id="f-url" type="text" placeholder="fichier.html ou https://…" />
    </div>
    <div class="field">
      <label>Date</label>
      <input id="f-date" type="month" />
    </div>
    <div class="field">
      <label>Tags</label>
      <div class="tags-wrap" id="tags-wrap"></div>
      <div class="new-tag-row">
        <input class="new-tag-input" id="new-tag-input" type="text" placeholder="Créer un tag…" maxlength="20" />
        <button class="btn-add-tag" id="btn-add-tag">+ Ajouter</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-delete" id="btn-delete" style="display:none">Supprimer</button>
      <button class="btn-save" id="btn-save">Enregistrer</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_PROJECTS = [
  { id:"1", title:"Email Templates", desc:"Gabarits d'emails HTML responsive et personnalisables.", url:"email-templates.html", icon:"✉️", tags:["design","artifact"], date:"2025-06" }
];

const DEFAULT_TAGS = {
  design:   { label:"Design",    color:"#085041", bg:"#E1F5EE", dot:"#1D9E75" },
  proto:    { label:"Prototype", color:"#633806", bg:"#FAEEDA", dot:"#BA7517" },
  artifact: { label:"Artifact",  color:"#4A1B0C", bg:"#FAECE7", dot:"#D85A30" },
  data:     { label:"Données",   color:"#042C53", bg:"#E6F1FB", dot:"#378ADD" },
  ui:       { label:"UI",        color:"#26215C", bg:"#EEEDFE", dot:"#534AB7" },
  autre:    { label:"Autre",     color:"#2C2C2A", bg:"#F1EFE8", dot:"#888780" }
};

const PALETTE = [
  {color:"#26215C",bg:"#EEEDFE",dot:"#534AB7"},
  {color:"#085041",bg:"#E1F5EE",dot:"#1D9E75"},
  {color:"#4A1B0C",bg:"#FAECE7",dot:"#D85A30"},
  {color:"#042C53",bg:"#E6F1FB",dot:"#378ADD"},
  {color:"#27500A",bg:"#EAF3DE",dot:"#639922"},
  {color:"#4B1528",bg:"#FBEAF0",dot:"#D4537E"},
];

const SK = "jb_portfolio";
function loadState() {
  try { const s = localStorage.getItem(SK); if (s) return JSON.parse(s); } catch(e) {}
  return { projects: DEFAULT_PROJECTS, tags: DEFAULT_TAGS };
}
function saveState() { localStorage.setItem(SK, JSON.stringify(state)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }

let state = loadState();
let activeFilter = "all";
let searchQ = "";
let editingId = null;
let selectedTags = [];

/* ── Nav ── */
function buildNav() {
  const nav = document.getElementById("nav");
  nav.querySelectorAll(".nav-btn,.nav-lbl").forEach(el => el.remove());
  nav.appendChild(makeNavBtn("all", "Tous les projets"));
  const used = [...new Set(state.projects.flatMap(p => p.tags||[]))].sort();
  if (used.length) {
    const lbl = document.createElement("div"); lbl.className="nav-lbl"; lbl.textContent="Catégories";
    nav.appendChild(lbl);
    used.forEach(t => nav.appendChild(makeNavBtn(t, state.tags[t]?.label||t, state.tags[t]?.dot)));
  }
}
function makeNavBtn(filter, label, dot) {
  const b = document.createElement("button");
  b.className = "nav-btn" + (filter===activeFilter?" active":"");
  b.dataset.filter = filter;
  if (dot) { const d=document.createElement("div"); d.className="nav-dot"; d.style.background=dot; b.appendChild(d); }
  const sp=document.createElement("span"); sp.textContent=label; b.appendChild(sp);
  const ct=document.createElement("span"); ct.className="nav-count";
  ct.textContent = filter==="all" ? state.projects.length : state.projects.filter(p=>(p.tags||[]).includes(filter)).length;
  b.appendChild(ct);
  b.addEventListener("click", ()=>{ activeFilter=filter; document.querySelectorAll(".nav-btn").forEach(x=>x.classList.toggle("active",x.dataset.filter===filter)); render(); });
  return b;
}

/* ── Render ── */
function render() {
  const grid = document.getElementById("grid");
  let list = state.projects.filter(p => {
    const mf = activeFilter==="all"||(p.tags||[]).includes(activeFilter);
    const ms = !searchQ||p.title.toLowerCase().includes(searchQ)||(p.desc||"").toLowerCase().includes(searchQ);
    return mf && ms;
  });
  document.getElementById("sec-title").textContent = activeFilter==="all"?"Tous les projets":(state.tags[activeFilter]?.label||activeFilter);
  document.getElementById("sec-count").textContent = list.length ? list.length+" projet"+(list.length>1?"s":"") : "";
  grid.innerHTML = "";
  if (!list.length) { grid.innerHTML='<div class="empty">Aucun projet.</div>'; return; }
  list.forEach(p => {
    const a = document.createElement("a");
    a.className = "card";
    if (p.url) { a.href=p.url; if(p.url.startsWith("http")) a.target="_blank"; }
    const dateStr = p.date ? p.date.replace("-"," / ") : "";
    const badges = (p.tags||[]).map(t=>{ const c=state.tags[t]||{}; return `<span class="badge" style="background:${c.bg||'#eee'};color:${c.color||'#333'}">${c.label||t}</span>`; }).join("");
    a.innerHTML = `
      <div class="card-edit" data-id="${p.id}" title="Modifier">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </div>
      <div class="card-top"><div class="card-ico">${p.icon||"📄"}</div><span class="card-date">${dateStr}</span></div>
      <div class="card-title">${p.title}</div>
      <div class="card-desc">${p.desc||""}</div>
      <div class="card-footer">${badges}</div>`;
    a.querySelector(".card-edit").addEventListener("click", e=>{ e.preventDefault(); e.stopPropagation(); openModal(p.id); });
    grid.appendChild(a);
  });
}

/* ── Modal ── */
function openModal(id) {
  editingId = id||null;
  const p = id ? state.projects.find(x=>x.id===id) : null;
  document.getElementById("modal-title").textContent = p?"Modifier le projet":"Nouveau projet";
  document.getElementById("f-icon").value  = p?.icon||"";
  document.getElementById("f-title").value = p?.title||"";
  document.getElementById("f-desc").value  = p?.desc||"";
  document.getElementById("f-url").value   = p?.url||"";
  document.getElementById("f-date").value  = p?.date||"";
  document.getElementById("btn-delete").style.display = p?"block":"none";
  document.getElementById("new-tag-input").value = "";
  selectedTags = [...(p?.tags||[])];
  renderChips();
  document.getElementById("overlay").classList.add("open");
  setTimeout(()=>document.getElementById("f-title").focus(), 50);
}
function closeModal() { document.getElementById("overlay").classList.remove("open"); }

function renderChips() {
  const wrap = document.getElementById("tags-wrap");
  wrap.innerHTML = "";
  Object.entries(state.tags).forEach(([key, cfg]) => {
    const sel = selectedTags.includes(key);
    const chip = document.createElement("div");
    chip.className = "tag-chip";
    if (sel) { chip.style.background=cfg.bg; chip.style.color=cfg.color; chip.style.borderColor="transparent"; }
    chip.innerHTML = `<div class="chip-dot" style="background:${cfg.dot}"></div><span>${cfg.label}</span>`;
    chip.addEventListener("click", ()=>{ selectedTags = sel ? selectedTags.filter(t=>t!==key) : [...selectedTags,key]; renderChips(); });
    wrap.appendChild(chip);
  });
}

function addTag(raw) {
  const label = raw.trim(); if (!label) return;
  const key = label.toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,""); if (!key) return;
  if (!state.tags[key]) {
    const pal = PALETTE[Object.keys(state.tags).length % PALETTE.length];
    state.tags[key] = { label, ...pal };
    saveState();
  }
  if (!selectedTags.includes(key)) selectedTags.push(key);
  document.getElementById("new-tag-input").value = "";
  renderChips(); buildNav();
}

document.getElementById("btn-add-tag").addEventListener("click", ()=>addTag(document.getElementById("new-tag-input").value));
document.getElementById("new-tag-input").addEventListener("keydown", e=>{ if(e.key==="Enter"){e.preventDefault();addTag(e.target.value);} });

document.getElementById("btn-save").addEventListener("click", ()=>{
  const title = document.getElementById("f-title").value.trim();
  if (!title) { document.getElementById("f-title").focus(); return; }
  const data = { id:editingId||uid(), title, desc:document.getElementById("f-desc").value.trim(), url:document.getElementById("f-url").value.trim(), icon:document.getElementById("f-icon").value.trim()||"📄", tags:[...selectedTags], date:document.getElementById("f-date").value };
  state.projects = editingId ? state.projects.map(p=>p.id===editingId?data:p) : [data,...state.projects];
  saveState(); buildNav(); render(); closeModal();
});

document.getElementById("btn-delete").addEventListener("click", ()=>{
  if (!editingId||!confirm("Supprimer ce projet ?")) return;
  state.projects = state.projects.filter(p=>p.id!==editingId);
  saveState(); buildNav(); render(); closeModal();
});

document.getElementById("btn-new").addEventListener("click", ()=>openModal(null));
document.getElementById("modal-close").addEventListener("click", closeModal);
document.getElementById("overlay").addEventListener("click", e=>{ if(e.target===e.currentTarget) closeModal(); });
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });
document.getElementById("search").addEventListener("input", e=>{ searchQ=e.target.value.toLowerCase().trim(); render(); });

buildNav(); render();
</script>
</body>
</html>
